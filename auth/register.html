<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | System Design Trainer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

     <style>
        .gradient-bg {
            background: linear-gradient(135deg, #000000 0%, #5d81b0 100%);
        }
        .card-shadow {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes subtle-tilt {
            0%, 100% {
                transform: rotate(-2deg);
            }
            50% {
                transform: rotate(2deg);
            }
        }

        .animate-subtle-tilt {
            animation: subtle-tilt 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">

     <!-- Card -->
        <div class="bg-white rounded-2xl card-shadow p-8">

            <!-- Logo centrado con animación -->
    <div class="flex justify-center mb-6">
        <div class="h-50 w-50 rounded-xl bg-white-600 flex items-center justify-center animate-subtle-tilt">
            <img src="../trainer.png" alt="Logo" class="h-50 w-50 object-contain">
        </div>
    </div>
    
    <!-- Título centrado -->
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">System Design Trainer</h1>
        <p class="text-sm text-gray-600">Master your next interview</p>
    </div>
        <!-- Registration Form -->
        <form class="space-y-6">

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Full Name
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" required
                           class="pl-10 w-full border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="John Doe">
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Email Address
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" required
                           class="pl-10 w-full border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="you@example.com">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input id="password" type="password" required
                           class="pl-10 w-full border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="••••••••">
                    <button type="button" onclick="togglePassword('password', this)"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Confirm Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input id="confirmPassword" type="password" required
                           class="pl-10 w-full border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="••••••••">
                    <button type="button" onclick="togglePassword('confirmPassword', this)"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="flex items-center">
                <input id="terms" type="checkbox" required
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="terms" class="ml-2 block text-sm text-gray-700">
                    I agree to the Terms and Privacy Policy
                </label>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <i class="fas fa-user-plus mr-2"></i>
                Create Account
            </button>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>

            <!-- Social -->
            <div class="grid grid-cols-2 gap-3">
                <a href="#" class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i class="fab fa-google text-red-500 mr-2"></i>
                    Google
                </a>
                <a href="#" class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i class="fab fa-github text-gray-800 mr-2"></i>
                    GitHub
                </a>
            </div>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 text-center">
            <p class="text-gray-600">
                Already have an account?
                <a href="/login" class="text-blue-600 hover:text-blue-500 font-medium">
                    Sign in
                </a>
            </p>
            <p class="mt-2 text-sm text-gray-500">
                Want to try as guest?
                <a href="/app" class="text-blue-600 hover:text-blue-500">
                    Go to app
                </a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-white">
        <p class="text-sm">&copy; 2024 System Design Trainer. All rights reserved.</p>
        <div class="mt-2 space-x-4">
            <a href="#" class="text-sm opacity-80 hover:opacity-100">Privacy Policy</a>
            <a href="#" class="text-sm opacity-80 hover:opacity-100">Terms of Service</a>
            <a href="#" class="text-sm opacity-80 hover:opacity-100">Contact</a>
        </div>
    </div>
</div>
    <!-- Floating Elements -->
    <!--
    <div class="absolute top-10 left-10 w-64 h-64 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 floating"></div>
    <div class="absolute bottom-10 right-10 w-64 h-64 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 floating" style="animation-delay: -3s;"></div>
    -->
<script>
    function togglePassword(fieldId, button) {
        const input = document.getElementById(fieldId);
        const icon = button.querySelector("i");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

</body>
</html>
